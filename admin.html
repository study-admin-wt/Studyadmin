<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studypoint — Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --input: #252836;
      --border: #2d3048;
      --accent: #6366f1;
      --accent-h: #818cf8;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .logo-name { font-size: 20px; font-weight: 700; }
    .logo-name span { color: var(--accent); }

    .logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .logout:hover { border-color: #ef4444; color: #f87171; }

    .content {
      padding: 28px 20px;
      max-width: 480px;
      margin: 0 auto;
    }

    .hello { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .hello-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    .action-cards { display: grid; gap: 14px; }

    .action-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.15s;
    }

    .action-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 26px;
      width: 50px;
      height: 50px;
      background: var(--input);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
    .card-desc { font-size: 13px; color: var(--muted); line-height: 1.4; }
    .arrow { margin-left: auto; color: var(--muted); font-size: 22px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo-name">Study<span>point</span></div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <div class="hello">Welcome back 👋</div>
    <div class="hello-sub">What do you want to do?</div>

    <div class="action-cards">
      <a class="action-card" href="generate.html">
        <div class="card-icon">✨</div>
        <div>
          <div class="card-title">Generate with AI</div>
          <div class="card-desc">Give a prompt or image — AI writes the notes</div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="action-card" href="manual.html">
        <div class="card-icon">✏️</div>
        <div>
          <div class="card-title">Add Manually</div>
          <div class="card-desc">Create, update, or delete notes yourself</div>
        </div>
        <div class="arrow">›</div>
      </a>
    </div>
  </div>

  <script>
    // =============================================
    // API BASE URL
    // Change this to your Render backend URL
    // =============================================
    const API_BASE = 'api-callstudy.onrender.com';

    // Redirect to login if not logged in
    if (!localStorage.getItem('sp_token')) {
      window.location.href = 'log.html';
    }

    function logout() {
      localStorage.removeItem('sp_token');
      window.location.href = 'log.html';
    }
  </script>
</body>
</html>
