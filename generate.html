<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studypoint — Generate</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --input: #252836;
      --border: #2d3048;
      --accent: #6366f1;
      --accent-h: #818cf8;
      --success: #22c55e;
      --error: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .back {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    .page-title { font-size: 18px; font-weight: 600; }

    .content {
      padding: 24px 20px;
      max-width: 480px;
      margin: 0 auto;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 100px; }

    /* Image toggle row */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .toggle {
      width: 42px;
      height: 24px;
      background: var(--border);
      border-radius: 99px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .toggle.on { background: var(--accent); }

    .toggle::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: left 0.2s;
    }

    .toggle.on::after { left: 21px; }

    .toggle-label { font-size: 14px; color: var(--muted); }

    /* Image upload area */
    .img-area { display: none; margin-bottom: 18px; }
    .img-area.show { display: block; }

    .img-pick {
      background: var(--input);
      border: 1px dashed var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 20px;
      width: 100%;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .img-pick:hover { border-color: var(--accent); }

    #imgPreview {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 10px;
      display: none;
    }

    /* Generate button */
    .gen-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 15px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .gen-btn:hover { background: var(--accent-h); }
    .gen-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Status message */
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }

    .status.success {
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
      color: #4ade80;
      display: block;
    }

    .status.error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
      display: block;
    }

    .status.loading {
      background: rgba(99,102,241,.1);
      border: 1px solid rgba(99,102,241,.3);
      color: var(--accent-h);
      display: block;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back" onclick="window.location.href='admin.html'">‹</button>
    <div class="page-title">Generate with AI</div>
  </div>

  <div class="content">

    <div class="field">
      <label for="title">Title *</label>
      <input type="text" id="title" placeholder="e.g. Introduction to OOP">
    </div>

    <div class="field">
      <label for="subject">Subject *</label>
      <input type="text" id="subject" placeholder="e.g. java">
    </div>

    <div class="field">
      <label for="prompt">Prompt <span style="color:#4b5563">(optional — AI uses title if empty)</span></label>
      <textarea id="prompt" placeholder="Describe what to include in the notes..."></textarea>
    </div>

    <!-- Image toggle -->
    <div class="toggle-row">
      <button class="toggle" id="imgToggle" onclick="toggleImg()"></button>
      <span class="toggle-label">Include an image</span>
    </div>

    <!-- Image upload (visible when toggle is on) -->
    <div class="img-area" id="imgArea">
      <div class="img-pick" onclick="document.getElementById('imgFile').click()">
        📷 Tap to pick an image
      </div>
      <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="onImagePick(this)">
      <img id="imgPreview" alt="Preview">
    </div>

    <button class="gen-btn" id="genBtn" onclick="generate()">✨ Generate Note</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    // =============================================
    // API BASE URL
    // Change this to your Render backend URL
    // Example: https://studypoint-backend.onrender.com
    // =============================================
    const API_BASE = 'https://api-callstudy.onrender.com';

    // Redirect to login if not logged in
    const token = localStorage.getItem('sp_token');
    if (!token) window.location.href = 'log.html';

    // --- Image toggle ---
    let imgOn = false;

    function toggleImg() {
      imgOn = !imgOn;
      document.getElementById('imgToggle').classList.toggle('on', imgOn);
      document.getElementById('imgArea').classList.toggle('show', imgOn);
      if (!imgOn) {
        document.getElementById('imgFile').value = '';
        document.getElementById('imgPreview').style.display = 'none';
      }
    }

    // Show image preview after picking
    function onImagePick(input) {
      const file = input.files[0];
      if (!file) return;
      const prev = document.getElementById('imgPreview');
      prev.src = URL.createObjectURL(file);
      prev.style.display = 'block';
    }

    // Convert image file to base64 string
    function toBase64(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]); // Remove "data:image/...;base64," prefix
        r.onerror = () => rej(new Error('File read failed'));
        r.readAsDataURL(file);
      });
    }

    // Set status message
    function setStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = `status ${type}`;
      el.textContent = msg;
    }

    // --- Main generate function ---
    async function generate() {
      const title   = document.getElementById('title').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const prompt  = document.getElementById('prompt').value.trim();
      const btn     = document.getElementById('genBtn');

      if (!title || !subject) {
        setStatus('error', 'Title and subject are required');
        return;
      }

      // Build request body
      let body = { title, subject, prompt };

      // If image toggle is on, convert image to base64
      if (imgOn) {
        const fileInput = document.getElementById('imgFile');
        const file = fileInput.files[0];
        if (file) {
          setStatus('loading', 'Reading image...');
          body.imageBase64 = await toBase64(file);
          body.mimeType    = file.type; // e.g. 'image/jpeg', 'image/png'
        }
      }

      btn.disabled = true;
      btn.textContent = '⏳ Generating...';
      setStatus('loading', 'Sending to AI... This can take up to 30 seconds.');

      try {
        const res = await fetch(`${API_BASE}/api/generate`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` // Send JWT with every protected request
          },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        // Session expired → back to login
        if (res.status === 401) {
          localStorage.removeItem('sp_token');
          window.location.href = 'log.html';
          return;
        }

        if (data.success) {
          setStatus('success', `✅ Note saved!\nID: ${data.noteId}`);
          // Clear form after success
          document.getElementById('title').value = '';
          document.getElementById('subject').value = '';
          document.getElementById('prompt').value = '';
          document.getElementById('imgFile').value = '';
          document.getElementById('imgPreview').style.display = 'none';
          if (imgOn) toggleImg(); // Turn off image toggle
        } else {
          setStatus('error', `❌ ${data.message}`);
        }

      } catch {
        setStatus('error', 'Cannot reach server. Check your connection.');
      } finally {
        btn.disabled = false;
        btn.textContent = '✨ Generate Note';
      }
    }
  </script>
</body>
</html>
