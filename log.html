<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studypoint — Login</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --input: #252836;
      --border: #2d3048;
      --accent: #6366f1;
      --accent-h: #818cf8;
      --error: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 24px;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-name span { color: var(--accent); }

    .logo-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 5px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--accent-h); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .err {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      margin-top: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-name">Study<span>point</span></div>
      <div class="logo-sub">Admin Panel</div>
    </div>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">

    <button class="btn" id="loginBtn" onclick="login()">Login</button>
    <div class="err" id="errMsg"></div>
  </div>

  <script>
    // =============================================
    // API BASE URL
    // Change this to your Render backend URL
    // Example: https://studypoint-backend.onrender.com
    // =============================================
    const API_BASE = 'https://api-callstudy.onrender.com';

    // If already logged in, skip to dashboard
    if (localStorage.getItem('sp_token')) {
      window.location.href = 'admin.html';
    }

    // Allow Enter key on password field to submit
    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errMsg');

      if (!username || !password) {
        showErr('Enter username and password');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';
      err.style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('sp_token', data.token); // Save JWT token
          window.location.href = 'admin.html';
        } else {
          showErr(data.message || 'Login failed');
        }

      } catch {
        showErr('Cannot reach server. Check your connection.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    function showErr(msg) {
      const el = document.getElementById('errMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
